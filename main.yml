name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 — Continuous Integration (Quality Gate)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # STAGE 2 — Continuous Deployment
  # Only runs if ALL tests pass. Only on main branch.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test                        # Hard dependency — blocked if test job fails
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
        # RENDER_DEPLOY_HOOK_URL is stored as a GitHub Actions secret.
        # Generate it in: Render Dashboard → Your Service → Settings → Deploy Hooks

      - name: Deployment confirmation
        run: |
          echo "Deployment triggered successfully at $(date -u)"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
